name: Sync wasm from ichigojam-rs

# Shiyo1101/ichigojam-rs の web/core 更新を受けて (repository_dispatch) 、
# 最新の ichigojam-rs をチェックアウトし直して wasm を再ビルドし、
# src/wasm/ を同期して差分があれば PR を自動作成する。

on:
  repository_dispatch:
    types: [sync-wasm]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ichigojam-react
        uses: actions/checkout@v4

      - name: Checkout ichigojam-rs
        uses: actions/checkout@v4
        with:
          repository: Shiyo1101/ichigojam-rs
          token: ${{ secrets.ICHIGOJAM_RS_READ_TOKEN }}
          ref: ${{ github.event.client_payload.sha || 'main' }}
          path: ichigojam-rs-src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Resolve wasm-bindgen-cli version
        id: wbg
        run: |
          VERSION=$(grep -A2 'name = "wasm-bindgen"' ichigojam-rs-src/Cargo.lock | grep version | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache wasm-bindgen-cli
        id: cache-wbg
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-${{ steps.wbg.outputs.version }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wbg.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version ${{ steps.wbg.outputs.version }}

      - name: Build wasm
        working-directory: ichigojam-rs-src
        run: cargo build --release --target wasm32-unknown-unknown -p ichigojam-web

      - name: Run wasm-bindgen
        run: |
          mkdir -p /tmp/wbg-out
          wasm-bindgen \
            ichigojam-rs-src/target/wasm32-unknown-unknown/release/ichigojam_web.wasm \
            --target web --out-dir /tmp/wbg-out

      - name: Sync src/wasm
        run: |
          mkdir -p src/wasm
          cp /tmp/wbg-out/ichigojam_web.js src/wasm/ichigojam_web.js
          cp /tmp/wbg-out/ichigojam_web.d.ts src/wasm/ichigojam_web.d.ts

          {
            echo "// 自動生成 (.github/workflows/sync-wasm.yml)。手で編集しない。"
            echo "// ichigojam_web_bg.wasm を base64 インラインし、fetch なしで init へ渡す。"
            printf 'export const wasmBase64 =\n  "%s";\n' "$(base64 -w0 /tmp/wbg-out/ichigojam_web_bg.wasm)"
          } > src/wasm/wasmBinary.ts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # packageManager (pnpm@11.9.0) が Node >= 22.13 を要求するため、
          # Node 20 だと pnpm 呼び出し (cache: pnpm のキャッシュパス解決) が
          # ERR_UNKNOWN_BUILTIN_MODULE (node:sqlite 不在) で落ちる。
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build (sanity check)
        run: pnpm run build

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: src/wasm
          commit-message: "chore: sync wasm from ichigojam-rs@${{ github.event.client_payload.sha }}"
          branch: auto/sync-wasm
          delete-branch: true
          title: "chore: sync wasm from ichigojam-rs"
          body: |
            ichigojam-rs の web/core 更新に伴う wasm 自動同期 PR です。

            Source: Shiyo1101/ichigojam-rs@${{ github.event.client_payload.sha }}
